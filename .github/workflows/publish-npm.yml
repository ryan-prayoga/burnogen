name: Publish To npm

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run verify

      - name: Publish to npm
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            npm publish --tag next
          else
            npm publish
          fi
