openapi: 3.1.0
paths:
  /api/users:
    post:
      operationId: usercontrollerStore
      summary: UserController::store
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  maxLength: 255
                  type: string
                email:
                  format: email
                  type: string
                age:
                  nullable: true
                  minimum: 18
                  type: integer
                status:
                  enum:
                    - draft
                    - active
                  type: string
                members:
                  items:
                    type: object
                    properties:
                      email:
                        format: email
                        type: string
                      role:
                        enum:
                          - owner
                          - member
                        type: string
                      permissions:
                        items:
                          type: string
                          enum:
                            - read
                            - write
                        type: array
                    required:
                      - email
                      - role
                  type: array
                profile:
                  nullable: true
                  type: object
                  properties:
                    name:
                      type: string
                    timezone:
                      nullable: true
                      type: string
                  required:
                    - name
              required:
                - name
                - email
                - members
      responses:
        "201":
          description: Inferred JSON response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
              example:
                message: User created
                data:
                  id: 1
                  name: Jane Doe
                  email: jane@example.com
      security:
        - bearerAuth: []
  /api/projects:
    get:
      operationId: projectcontrollerIndex
      summary: ProjectController::index
      tags:
        - Project
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Inferred Laravel resource response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        owner_email:
                          type: string
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      from:
                        type: integer
                      last_page:
                        type: integer
                      per_page:
                        type: integer
                      to:
                        type: integer
                      total:
                        type: integer
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                      last:
                        type: string
                      prev:
                        type: string
                        nullable: true
                      next:
                        type: string
                        nullable: true
              example:
                data:
                  - id: 1
                    name: Jane Doe
                    owner_email: user@example.com
                meta:
                  current_page: 1
                  from: 1
                  last_page: 1
                  per_page: 15
                  to: 1
                  total: 1
                links:
                  first: ?page=1
                  last: ?page=1
                  prev: null
                  next: null
