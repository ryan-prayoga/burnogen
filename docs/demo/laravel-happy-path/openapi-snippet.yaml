openapi: 3.1.0
paths:
  /api/users:
    post:
      operationId: usercontrollerStore
      summary: UserController::store
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  maxLength: 255
                  type: string
                email:
                  format: email
                  type: string
                age:
                  nullable: true
                  minimum: 18
                  type: integer
                status:
                  enum:
                    - draft
                    - active
                  type: string
                members:
                  items:
                    type: object
                    properties:
                      email:
                        format: email
                        type: string
                      role:
                        enum:
                          - owner
                          - member
                        type: string
                      permissions:
                        items:
                          type: string
                          enum:
                            - read
                            - write
                        type: array
                    required:
                      - email
                      - role
                  type: array
                profile:
                  nullable: true
                  type: object
                  properties:
                    name:
                      type: string
                    timezone:
                      nullable: true
                      type: string
                  required:
                    - name
              required:
                - name
                - email
                - members
      responses:
        "201":
          description: Inferred JSON response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
              example:
                message: User created
                data:
                  id: 1
                  name: Jane Doe
                  email: jane@example.com
      security:
        - bearerAuth: []
