openapi: 3.1.0
info:
  title: example.com/ginapp
  version: 1.0.0
servers:
  - url: "{{baseUrl}}"
paths:
  /api/users:
    post:
      operationId: createUser
      summary: POST /api/users
      tags:
        - api
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                age:
                  type: integer
              required:
                - name
                - email
      responses:
        "201":
          description: Inferred JSON response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      name:
                        type: string
                      email:
                        type: string
                      age:
                        type: integer
              example:
                message: user created
                data:
                  name: Jane Doe
                  email: user@example.com
                  age: 1
